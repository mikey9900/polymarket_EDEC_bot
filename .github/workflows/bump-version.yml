name: Auto-bump HA add-on version

on:
  push:
    branches: [main]
    paths:
      - 'edec_bot/**'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version in config.json
        run: |
          CONFIG=edec_bot/config.json
          CURRENT=$(jq -r '.version' $CONFIG)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          jq --arg v "$NEW" '.version = $v' $CONFIG > tmp.json && mv tmp.json $CONFIG
          echo "Bumped $CURRENT → $NEW"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add edec_bot/config.json
          git commit -m "chore: bump add-on version [skip ci]"
          git push
