# EDEC Bot Configuration

# Coins to monitor (all run 5-min up/down markets simultaneously)
coins:
  - btc
  - eth
  - sol
  - xrp
  - bnb
  - doge
  - hype

# Dual-leg arbitrage: buy BOTH sides when combined asks < 1.00 (rare but guaranteed profit)
dual_leg:
  enabled: true
  price_threshold: 0.45        # Max ask per side
  max_combined_cost: 0.99      # YES ask + NO ask must be below this (after fees need ~0.05 edge)
  min_edge_after_fees: 0.05    # Minimum net profit per share
  min_time_remaining_s: 60     # Skip if less than this many seconds left
  max_velocity_30s: 0.15       # Skip if coin moved >X% in 30s (trending against dual-leg)
  max_velocity_60s: 0.25
  min_book_depth_usd: 10.0     # Min USD depth at target price on each side

# Single-leg momentum: buy the cheap side, sell when it reprices
single_leg:
  enabled: true
  entry_max: 0.32              # Buy when one side's ask is at or below this (tighter = better EV)
  opposite_min: 0.62           # Other side must be >= this (confirms real directional move)
  target_sell: 0.52            # Place GTC sell at this price (~50% gross gain)
  min_time_remaining_s: 90     # Need time for reprice before market closes
  min_book_depth_usd: 5.0      # Min USD depth at entry price
  hold_if_unfilled: true       # If sell order not filled at close, hold to resolution
  order_size_usd: 3.0          # Dollar amount per trade
  min_velocity_30s: 0.08       # Coin must have moved >=0.08% in 30s (proves real directional move, not just thin book)
  loss_cut_pct: 0.25           # Exit if loss exceeds this % of entry (tightened from 0.40 — data showed 40% cut too wide)
  high_confidence_bid: 0.82    # Stop monitoring, hold to resolution if bid exceeds this
  time_pressure_s: 90.0        # Loss threshold scales down linearly below this seconds remaining
  max_time_remaining_s: 200.0  # Skip entries if >200s remain — wait for first 100s to establish direction
  max_vel_divergence: 0.03     # Reject if vel60s opposes trade direction by >0.03% (counter-trend divergence)
  entry_min: 0.15              # Skip if ask already below this — market near-resolved, recovery unreachable

# Lead-lag: buy the winning side BEFORE Polymarket books fully reprice
# When a coin moves fast on Binance/Coinbase, Polymarket lags by ~5-30s.
# We buy the side that *should* win (momentum-following) at the still-cheap price.
lead_lag:
  enabled: true
  min_velocity_30s: 0.12      # Coin must move >=0.12% in 30s to trigger (loosened from 0.15 — window was firing 0 times)
  min_entry: 0.48             # Winning-side ask must be >=0.48 (some repricing has begun)
  max_entry: 0.62             # Must be <=0.62 (widened from 0.60 — was missing valid lag entries)
  target_sell: 0.67           # Exit price when books have fully repriced
  min_time_remaining_s: 60    # Need time for repricing to propagate
  min_book_depth_usd: 5.0
  order_size_usd: 3.0

# Swing dual-leg: buy one side when cheap, wait for the other to also dip, complete the arb.
# If the second leg never dips, sell the first leg at exit price for a small gain.
swing_leg:
  enabled: true
  first_leg_max: 0.33         # Buy first leg when ask <= this (tightened from 0.40 — sim showed 0.30-0.33 blocks 82% of losses)
  second_leg_max: 0.45        # Buy second leg when it also dips to <= this
  first_leg_exit: 0.55        # Sell first leg at bid >= this if no second leg comes (raised from 0.52 — improve win size)
  max_velocity_30s: 0.12      # Skip if coin trending too hard (tightened from 0.20 — chop regime kills swing)
  min_time_remaining_s: 140   # Need time to wait for second leg to dip (raised from 120)
  min_book_depth_usd: 5.0
  order_size_usd: 3.0
  loss_cut_pct: 0.25          # Exit first leg if loss exceeds this %
  high_confidence_bid: 0.82   # Hold to resolution if first leg bid exceeds this
  time_pressure_s: 90.0       # Loss threshold scales down linearly below this seconds remaining
  dead_leg_threshold: 0.05    # In dual position: sell a leg if its bid drops below this (dual → single)
  max_time_remaining_s: 200.0 # Skip entries if >200s remain — wait for direction to establish
  first_leg_min: 0.25         # Skip if first leg ask already below this (raised from 0.20 — 0.20-0.24 zone is bid-evaporation)
  max_vel_divergence: 0.03    # Reject if vel60s strongly opposes vel30s direction
  max_depth_ratio: 2.5        # Reject if one side has >2.5x depth of other (second leg won't fill)
  disabled_coins:             # Coins excluded from swing_leg (BTC has strong momentum, not mean-reversion friendly)
    - btc

# Execution
execution:
  order_size_usd: 3.0          # Dual-leg: dollar amount per side
  abort_timeout_s: 2.0         # Max wait before aborting partial dual-leg fill
  max_slippage: 0.02
  dry_run: true                # true = log signals only, no real orders

# Risk management
risk:
  max_daily_loss_usd: 20.0     # Kill switch trigger
  max_open_positions: 5        # Max concurrent positions (across both strategies)
  max_trades_per_hour: 30
  session_profit_target: 0     # Stop after this profit (0 = disabled)

# Price feeds
feeds:
  # Binance WebSocket symbols for each coin (used for velocity tracking)
  binance_symbols:
    btc: btcusdt
    eth: ethusdt
    sol: solusdt
    xrp: xrpusdt
    bnb: bnbusdt
    doge: dogeusdt
    hype: null                 # Not on Binance — use order book price movement as proxy
  coinbase_product: "BTC-USD"
  coingecko_poll_interval_s: 30
  price_staleness_max_s: 5

# Polymarket API
polymarket:
  clob_base_url: "https://clob.polymarket.com"
  gamma_base_url: "https://gamma-api.polymarket.com"
  chain_id: 137
  tick_size: "0.01"
  neg_risk: false

# Logging
logging:
  level: "INFO"
  file: "bot.log"
  trade_log: "data/trades.jsonl"
