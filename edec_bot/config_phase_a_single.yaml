# Phase A: Single-leg scalp + runner learning profile
coins:
- btc
- eth
- sol
- xrp
- bnb
- doge
- hype

dual_leg:
  enabled: false
  price_threshold: 0.45
  max_combined_cost: 0.99
  min_edge_after_fees: 0.05
  min_time_remaining_s: 60
  max_velocity_30s: 0.12
  max_velocity_60s: 0.2
  min_book_depth_usd: 15.0

single_leg:
  enabled: true
  entry_max: 0.63
  opposite_min: 0.5
  min_time_remaining_s: 40
  min_book_depth_usd: 6.0
  hold_if_unfilled: true
  order_size_usd: 10.0
  min_velocity_30s: 0.12
  loss_cut_pct: 0.04
  loss_cut_max_factor: 1.35
  high_confidence_bid: 0.70
  time_pressure_s: 75.0
  max_time_remaining_s: 250.0
  max_vel_divergence: 0.03
  entry_min: 0.54
  scalp_take_profit_bid: 0.64
  scalp_min_profit_usd: 0.18
  resignal_cooldown_s: 0.5
  min_price_improvement: 0.0
  max_entry_spread: 0.04
  max_source_dispersion_pct: 0.25
  max_source_staleness_s: 1.5
  disabled_coins:
  - doge
  - hype
  - xrp
  - bnb

lead_lag:
  enabled: true
  min_velocity_30s: 0.12
  min_entry: 0.54
  max_entry: 0.63
  target_sell: 0.66
  min_time_remaining_s: 30
  min_book_depth_usd: 6.0
  order_size_usd: 10.0
  resignal_cooldown_s: 2.0
  min_price_improvement: 0.0
  profit_take_delta: 0.06
  profit_take_cap: 0.68
  stall_window_s: 30
  min_progress_delta: 0.02
  hard_stop_loss_pct: 0.04
  resignal_cooldown_s: 0.5
  min_price_improvement: 0.0
  max_entry_spread: 0.04
  max_source_dispersion_pct: 0.25
  max_source_staleness_s: 1.5
  disabled_coins:
  - doge
  - hype
  - xrp
  - bnb
  coin_overrides:
    xrp:
      min_velocity_30s: 0.18
      min_entry: 0.52
      max_entry: 0.60
      min_book_depth_usd: 20.0

swing_leg:
  enabled: false
  first_leg_max: 0.3
  first_leg_exit: 0.55
  max_velocity_30s: 0.08
  min_time_remaining_s: 150
  min_book_depth_usd: 15.0
  order_size_usd: 1.25
  loss_cut_pct: 0.2
  loss_cut_max_factor: 1.5
  high_confidence_bid: 0.85
  time_pressure_s: 75.0
  max_time_remaining_s: 170.0
  first_leg_min: 0.28
  max_vel_divergence: 0.02
  max_depth_ratio: 1.6
  disabled_coins:
  - btc
  - doge

execution:
  order_size_usd: 10.0
  abort_timeout_s: 2.0
  max_slippage: 0.015
  dry_run: true

risk:
  max_daily_loss_usd: 20.0
  max_open_positions: 8
  max_trades_per_hour: 90
  session_profit_target: 0

feeds:
  binance_symbols:
    btc: btcusdt
    eth: ethusdt
    sol: solusdt
    xrp: xrpusdt
    bnb: bnbusdt
    doge: dogeusdt
    # HYPE currently has only CoinGecko coverage in this profile, so trading stays disabled.
    hype: null
  coinbase_product: BTC-USD
  coingecko_poll_interval_s: 30
  price_staleness_max_s: 4

polymarket:
  clob_base_url: https://clob.polymarket.com
  gamma_base_url: https://gamma-api.polymarket.com
  chain_id: 137
  tick_size: '0.01'
  neg_risk: false

cli:
  enabled: true
  binary_path: polymarket
  timeout_s: 8
  signature_type: proxy
  allow_mutating_commands: false
  startup_check: true

logging:
  level: INFO
  file: bot.log
  trade_log: data/trades.jsonl
