# Phase A: Single-leg scalp + runner learning profile
coins:
- btc
- eth
- sol
- xrp
- bnb
- doge
- hype

dual_leg:
  enabled: false
  price_threshold: 0.45
  max_combined_cost: 0.99
  min_edge_after_fees: 0.05
  min_time_remaining_s: 60
  max_velocity_30s: 0.12
  max_velocity_60s: 0.2
  min_book_depth_usd: 15.0

single_leg:
  enabled: true
  entry_max: 0.62
  opposite_min: 0.4
  min_time_remaining_s: 100
  min_book_depth_usd: 12.0
  hold_if_unfilled: true
  order_size_usd: 2.0
  min_velocity_30s: 0.1
  loss_cut_pct: 0.22
  loss_cut_max_factor: 1.6
  high_confidence_bid: 0.76
  time_pressure_s: 90.0
  max_time_remaining_s: 190.0
  max_vel_divergence: 0.03
  entry_min: 0.45
  scalp_take_profit_bid: 0.62
  scalp_min_profit_usd: 0.12

lead_lag:
  enabled: false
  min_velocity_30s: 0.16
  min_entry: 0.5
  max_entry: 0.6
  target_sell: 0.67
  min_time_remaining_s: 70
  min_book_depth_usd: 12.0
  order_size_usd: 2.0

swing_leg:
  enabled: false
  first_leg_max: 0.3
  first_leg_exit: 0.55
  max_velocity_30s: 0.08
  min_time_remaining_s: 150
  min_book_depth_usd: 15.0
  order_size_usd: 1.25
  loss_cut_pct: 0.2
  loss_cut_max_factor: 1.5
  high_confidence_bid: 0.85
  time_pressure_s: 75.0
  max_time_remaining_s: 170.0
  first_leg_min: 0.28
  max_vel_divergence: 0.02
  max_depth_ratio: 1.6
  disabled_coins:
  - btc
  - doge

execution:
  order_size_usd: 2.0
  abort_timeout_s: 2.0
  max_slippage: 0.015
  dry_run: true

risk:
  max_daily_loss_usd: 20.0
  max_open_positions: 3
  max_trades_per_hour: 12
  session_profit_target: 0

feeds:
  binance_symbols:
    btc: btcusdt
    eth: ethusdt
    sol: solusdt
    xrp: xrpusdt
    bnb: bnbusdt
    doge: dogeusdt
    hype: null
  coinbase_product: BTC-USD
  coingecko_poll_interval_s: 30
  price_staleness_max_s: 4

polymarket:
  clob_base_url: https://clob.polymarket.com
  gamma_base_url: https://gamma-api.polymarket.com
  chain_id: 137
  tick_size: '0.01'
  neg_risk: false

logging:
  level: INFO
  file: bot.log
  trade_log: data/trades.jsonl
